name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag
        id: resolve
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match the required format 'vMAJOR.MINOR.PATCH' produced by the Tag Version workflow."
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag '$TAG' does not exist in this repository."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  validate:
    needs: verify-tag
    uses: ./.github/workflows/dotnet-build-test.yml
    with:
      checkout-ref: refs/tags/${{ needs.verify-tag.outputs.tag }}
      fail-fast: true

  build:
    needs: [verify-tag, validate]
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.verify-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/ModletBuilder.Cli/ModletBuilder.Cli.csproj -r ${{ matrix.rid }}

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/ModletBuilder.Cli/ModletBuilder.Cli.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --no-restore \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=embedded \
            -p:Version=${{ needs.validate.outputs.nuget-version }} \
            -p:AssemblyVersion=${{ needs.validate.outputs.assembly-version }} \
            -p:FileVersion=${{ needs.validate.outputs.file-version }} \
            -p:InformationalVersion=${{ needs.validate.outputs.informational-version }} \
            -p:IncludeSourceRevisionInInformationalVersion=false \
            -o publish/${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          TAG: ${{ needs.verify-tag.outputs.tag }}
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $name = "modlet-builder-$env:TAG-${{ matrix.rid }}.zip"
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath "artifacts/$name"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          TAG: ${{ needs.verify-tag.outputs.tag }}
        run: |
          mkdir -p artifacts
          name="modlet-builder-${TAG}-${{ matrix.rid }}.tar.gz"
          tar -czf "artifacts/$name" -C "publish/${{ matrix.rid }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modlet-builder-${{ matrix.rid }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [verify-tag, validate, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.verify-tag.outputs.tag }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ needs.verify-tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          PREV_TAG=""
          while IFS= read -r t; do
            if [ "$t" != "$TAG" ]; then
              PREV_TAG="$t"
              break
            fi
          done < <(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$')
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi

          breaking=(); features=(); fixes=(); docs_=(); tests=(); buildci=(); maint=(); other=()
          while IFS=$'\t' read -r sha subject; do
            entry="- ${subject} (\`${sha}\`)"
            if echo "$subject" | grep -qiE '\+semver:\s*(breaking|major)|BREAKING[- ]CHANGE'; then
              breaking+=("$entry")
            elif echo "$subject" | grep -qiE '\+semver:\s*(feature|minor)|^feat(\([^)]*\))?!?:'; then
              features+=("$entry")
            elif echo "$subject" | grep -qiE '\+semver:\s*(fix|patch)|^fix(\([^)]*\))?!?:'; then
              fixes+=("$entry")
            elif echo "$subject" | grep -qiE '^docs(\([^)]*\))?!?:'; then
              docs_+=("$entry")
            elif echo "$subject" | grep -qiE '^tests?(\([^)]*\))?!?:'; then
              tests+=("$entry")
            elif echo "$subject" | grep -qiE '^(ci|build)(\([^)]*\))?!?:'; then
              buildci+=("$entry")
            elif echo "$subject" | grep -qiE '^(chore|refactor|style|perf)(\([^)]*\))?!?:'; then
              maint+=("$entry")
            else
              other+=("$entry")
            fi
          done < <(git log --format="%h%x09%s" "$RANGE")

          {
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since ${PREV_TAG}"
            else
              echo "## Initial Release"
            fi
            echo ""

            if [ ${#breaking[@]} -gt 0 ]; then
              echo "### Breaking Changes"
              printf '%s\n' "${breaking[@]}"
              echo ""
            fi
            if [ ${#features[@]} -gt 0 ]; then
              echo "### Features"
              printf '%s\n' "${features[@]}"
              echo ""
            fi
            if [ ${#fixes[@]} -gt 0 ]; then
              echo "### Fixes"
              printf '%s\n' "${fixes[@]}"
              echo ""
            fi
            if [ ${#docs_[@]} -gt 0 ]; then
              echo "### Documentation"
              printf '%s\n' "${docs_[@]}"
              echo ""
            fi
            if [ ${#tests[@]} -gt 0 ]; then
              echo "### Tests"
              printf '%s\n' "${tests[@]}"
              echo ""
            fi
            if [ ${#buildci[@]} -gt 0 ]; then
              echo "### Build and CI"
              printf '%s\n' "${buildci[@]}"
              echo ""
            fi
            if [ ${#maint[@]} -gt 0 ]; then
              echo "### Maintenance"
              printf '%s\n' "${maint[@]}"
              echo ""
            fi
            if [ ${#other[@]} -gt 0 ]; then
              echo "### Other Changes"
              printf '%s\n' "${other[@]}"
              echo ""
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
            else
              echo "**Full Changelog**: https://github.com/${REPO}/commits/${TAG}"
            fi
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-tag.outputs.tag }}
          name: ${{ needs.verify-tag.outputs.tag }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: artifacts/*

      - name: Write summary
        run: |
          {
            echo "## Release summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Tag | \`${{ needs.verify-tag.outputs.tag }}\` |"
            echo "| Previous tag | \`${{ steps.notes.outputs.prev_tag || 'none (initial release)' }}\` |"
            echo "| Platforms | win-x64, linux-x64 |"
          } >> "$GITHUB_STEP_SUMMARY"
