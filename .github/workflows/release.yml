name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag
        id: resolve
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match the required format 'vMAJOR.MINOR.PATCH' produced by the Tag Version workflow."
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag '$TAG' does not exist in this repository."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: verify-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.verify-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/ModletBuilder.Cli/ModletBuilder.Cli.csproj -r ${{ matrix.rid }}

      - name: Publish
        shell: bash
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          dotnet publish src/ModletBuilder.Cli/ModletBuilder.Cli.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --no-restore \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=embedded \
            -p:Version=$VERSION \
            -p:AssemblyVersion=$VERSION.0 \
            -p:FileVersion=$VERSION.0 \
            -p:InformationalVersion=$VERSION \
            -o publish/${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          TAG: ${{ needs.verify-tag.outputs.tag }}
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $name = "modlet-builder-$env:TAG-${{ matrix.rid }}.zip"
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath "artifacts/$name"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          TAG: ${{ needs.verify-tag.outputs.tag }}
        run: |
          mkdir -p artifacts
          name="modlet-builder-${TAG}-${{ matrix.rid }}.tar.gz"
          tar -czf "artifacts/$name" -C "publish/${{ matrix.rid }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modlet-builder-${{ matrix.rid }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [verify-tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-tag.outputs.tag }}
          name: ${{ needs.verify-tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/*

      - name: Write summary
        run: |
          {
            echo "## Release summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Tag | \`${{ needs.verify-tag.outputs.tag }}\` |"
            echo "| Platforms | win-x64, linux-x64 |"
          } >> "$GITHUB_STEP_SUMMARY"
