name: .NET Build and Test

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: 'Git ref to check out. Defaults to the caller workflow ref.'
        required: false
        type: string
        default: ''
      configuration:
        description: 'Build configuration (Debug or Release).'
        required: false
        type: string
        default: 'Release'
      fail-fast:
        description: 'Whether to cancel all in-progress jobs if any matrix leg fails.'
        required: false
        type: boolean
        default: false
    outputs:
      nuget-version:
        description: 'GitVersion NuGet version (nuGetVersionV2).'
        value: ${{ jobs.determine-version.outputs.nuget-version }}
      assembly-version:
        description: 'GitVersion assembly semver (assemblySemVer).'
        value: ${{ jobs.determine-version.outputs.assembly-version }}
      file-version:
        description: 'GitVersion assembly sem file ver (assemblySemFileVer).'
        value: ${{ jobs.determine-version.outputs.file-version }}
      informational-version:
        description: 'GitVersion informational version (informationalVersion).'
        value: ${{ jobs.determine-version.outputs.informational-version }}
      major-minor-patch:
        description: 'GitVersion major.minor.patch (majorMinorPatch).'
        value: ${{ jobs.determine-version.outputs.major-minor-patch }}

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      nuget-version: ${{ steps.gitversion.outputs.nuGetVersionV2 }}
      assembly-version: ${{ steps.gitversion.outputs.assemblySemVer }}
      file-version: ${{ steps.gitversion.outputs.assemblySemFileVer }}
      informational-version: ${{ steps.gitversion.outputs.informationalVersion }}
      major-minor-patch: ${{ steps.gitversion.outputs.majorMinorPatch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout-ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.0.5'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

  validate:
    needs: determine-version
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout-ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ModletBuilder.sln

      - name: Build
        shell: bash
        run: |
          dotnet build ModletBuilder.sln \
            --configuration ${{ inputs.configuration }} \
            --no-restore \
            -p:Version=${{ needs.determine-version.outputs.nuget-version }} \
            -p:AssemblyVersion=${{ needs.determine-version.outputs.assembly-version }} \
            -p:FileVersion=${{ needs.determine-version.outputs.file-version }} \
            -p:InformationalVersion=${{ needs.determine-version.outputs.informational-version }}

      - name: Test
        shell: bash
        run: |
          dotnet test ModletBuilder.sln \
            --configuration ${{ inputs.configuration }} \
            --no-build \
            --verbosity normal

      - name: Write summary
        if: always()
        shell: bash
        env:
          BUILD_STATUS: ${{ job.status }}
        run: |
          case "$BUILD_STATUS" in
            success)   STATUS_ICON="✅ success" ;;
            failure)   STATUS_ICON="❌ failure" ;;
            cancelled) STATUS_ICON="⚪ cancelled" ;;
            *)         STATUS_ICON="❔ $BUILD_STATUS" ;;
          esac
          {
            echo "## Build summary (${{ matrix.rid }})"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Status | $STATUS_ICON |"
            echo "| OS | ${{ matrix.os }} |"
            echo "| Runtime | \`${{ matrix.rid }}\` |"
            echo "| Configuration | ${{ inputs.configuration }} |"
            echo "| NuGet version | \`${{ needs.determine-version.outputs.nuget-version }}\` |"
            echo "| Assembly version | \`${{ needs.determine-version.outputs.assembly-version }}\` |"
            echo "| File version | \`${{ needs.determine-version.outputs.file-version }}\` |"
            echo "| Informational version | \`${{ needs.determine-version.outputs.informational-version }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
