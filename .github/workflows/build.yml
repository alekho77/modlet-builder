name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.0.5'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Restore
        run: dotnet restore ModletBuilder.sln

      - name: Build
        run: dotnet build ModletBuilder.sln --configuration Release --no-restore -p:Version=${{ steps.gitversion.outputs.nuGetVersionV2 }} -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Build summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Configuration | Release |"
            echo "| NuGet version | \`${{ steps.gitversion.outputs.nuGetVersionV2 }}\` |"
            echo "| Assembly version | \`${{ steps.gitversion.outputs.assemblySemVer }}\` |"
            echo "| File version | \`${{ steps.gitversion.outputs.assemblySemFileVer }}\` |"
            echo "| Informational version | \`${{ steps.gitversion.outputs.informationalVersion }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
