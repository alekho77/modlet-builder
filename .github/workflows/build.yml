name: Build

on:
  pull_request:
    branches: [main]

jobs:
  matrix-build:
    uses: ./.github/workflows/dotnet-build-test.yml
    with:
      fail-fast: false

  build:
    needs: matrix-build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate matrix result
        run: |
          if [[ "${{ needs.matrix-build.result }}" != "success" ]]; then
            echo "::error::Matrix build failed: ${{ needs.matrix-build.result }}"
            exit 1
          fi
          echo "All matrix builds succeeded."
