name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.0.5'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Restore
        run: dotnet restore ModletBuilder.sln -r ${{ matrix.rid }}

      - name: Build
        shell: bash
        run: |
          dotnet build ModletBuilder.sln \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --no-restore \
            -p:Version=${{ steps.gitversion.outputs.nuGetVersionV2 }} \
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Build summary (${{ matrix.rid }})"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| OS | ${{ matrix.os }} |"
            echo "| Runtime | \`${{ matrix.rid }}\` |"
            echo "| Configuration | Release |"
            echo "| NuGet version | \`${{ steps.gitversion.outputs.nuGetVersionV2 }}\` |"
            echo "| Assembly version | \`${{ steps.gitversion.outputs.assemblySemVer }}\` |"
            echo "| File version | \`${{ steps.gitversion.outputs.assemblySemFileVer }}\` |"
            echo "| Informational version | \`${{ steps.gitversion.outputs.informationalVersion }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
