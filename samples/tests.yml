tests:
  - id: alloy-motor-tool-parts-golden
    name: Alloy Motor Tool Parts Golden Match
    description: Build the Alloy Motor Tool Parts sample and compare the output with the checked-in expected files.
    command:
      verb: build
      sources:
        - samples/golden/alloy-motor-tool-parts/src
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 0
      expected_result_path: samples/golden/alloy-motor-tool-parts/expected

  - id: alloy-dry-run-no-output
    name: Alloy Sample Dry Run
    description: Build the Alloy sample with dry-run and verify that no Config directory is created.
    command:
      verb: build
      sources:
        - samples/golden/alloy-motor-tool-parts/src
      output: "{tempOut}"
      dry_run: true
      verbosity: none
    expected:
      exit_code: 0
      config_created: false

  - id: alloy-clean-removes-stale-file
    name: Alloy Sample Clean Removes Stale File
    description: Pre-create a stale file in the output directory, run build with clean, and verify that the stale file is removed.
    command:
      verb: build
      sources:
        - samples/golden/alloy-motor-tool-parts/src
      output: "{tempOut}"
      clean: true
      verbosity: none
    pre_setup_files:
      - path: "{tempOut}/Config/stale.xml"
        content: <stale/>
    expected:
      exit_code: 0
      existing_paths:
        - Config/items.xml
      missing_paths:
        - Config/stale.xml

  - id: ev-lootbox-golden
    name: EV LootBox Golden Match
    description: Build the EV LootBox sample with cross-file lootgroup dependencies and compare the output with the checked-in expected files. Verifies that named fragments across separate files are resolved and ordered correctly by requires.
    command:
      verb: build
      sources:
        - samples/golden/ev-lootbox/src
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 0
      expected_result_path: samples/golden/ev-lootbox/expected

  - id: ev-lootbox-project-golden
    name: EV LootBox Project Golden Match
    description: Build the EV LootBox sample through a project YAML file and verify ModInfo.xml plus generated Config output.
    command:
      verb: build
      project: samples/golden/ev-lootbox/project.yml
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 0
      expected_result_path: samples/golden/ev-lootbox/expected-project

  - id: invalid-missing-dependency
    name: Missing Dependency Returns Error
    description: Build the invalid missing-dependency fixture and verify that no Config directory is created.
    command:
      verb: build
      sources:
        - samples/fixtures/missing-dependency.frag.xml
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 1
      config_created: false

  - id: invalid-cycle
    name: Dependency Cycle Returns Error
    description: Build the invalid cycle fixture and verify that no Config directory is created.
    command:
      verb: build
      sources:
        - samples/fixtures/cycle.frag.xml
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 1
      config_created: false

  - id: invalid-hint-attribute
    name: Hint Attribute Produces Warning
    description: Build the hint-attribute fixture and verify that the build succeeds with a warning and output is generated.
    command:
      verb: build
      sources:
        - samples/fixtures/hint-attribute.frag.xml
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 0
      config_created: true

  - id: invalid-malformed-xml
    name: Malformed XML Returns Error
    description: Build the invalid malformed fixture and verify that no Config directory is created.
    command:
      verb: build
      sources:
        - samples/fixtures/malformed.frag.xml
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 1
      config_created: false

  - id: no-fragments-found-error
    name: No Fragments Found Returns Error
    description: Point the build command at an empty source directory and verify that no Config directory is created.
    setup_directories:
      - "{tempSrc}/empty-src"
    command:
      verb: build
      sources:
        - "{tempSrc}/empty-src"
      output: "{tempOut}/empty-out"
      verbosity: none
    expected:
      exit_code: 1
      config_created: false

  - id: localization-sample-golden
    name: Localization Sample Golden Match
    description: Build the localization sample and compare the full output (Config/*.xml and Config/Localization.txt) with the checked-in expected files.
    command:
      verb: build
      sources:
        - samples/golden/localization-sample/src
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 0
      expected_result_path: samples/golden/localization-sample/expected

  - id: localization-dry-run-no-file
    name: Localization Dry Run Produces No Localization.txt
    description: Build a localization source with --dry-run and verify that Config/Localization.txt is not created.
    command:
      verb: build
      sources:
        - samples/golden/localization-sample/src
      output: "{tempOut}"
      dry_run: true
      verbosity: none
    expected:
      exit_code: 0
      config_created: false
      missing_paths:
        - Config/Localization.txt

  - id: localization-clean-removes-stale
    name: Localization Clean Removes Stale Localization.txt
    description: Pre-create a stale Localization.txt, run build with --clean, and verify that the stale file is gone and a fresh one is produced.
    command:
      verb: build
      sources:
        - samples/golden/localization-sample/src
      output: "{tempOut}"
      clean: true
      verbosity: none
    pre_setup_files:
      - path: "{tempOut}/Config/Localization.txt"
        content: "stale content"
    expected:
      exit_code: 0
      expected_result_path: samples/golden/localization-sample/expected

  - id: no-translate-true-golden
    name: noTranslate=true Produces x in NoTranslate Column
    description: Build a source fragment with noTranslate="true" and verify that the NoTranslate column in Localization.txt contains "x".
    command:
      verb: build
      sources:
        - samples/golden/no-translate-true/src
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 0
      expected_result_path: samples/golden/no-translate-true/expected

  - id: no-translate-false-golden
    name: noTranslate=false Produces Empty NoTranslate Column
    description: Build a source fragment with noTranslate="false" and verify that the NoTranslate column in Localization.txt is empty.
    command:
      verb: build
      sources:
        - samples/golden/no-translate-false/src
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 0
      expected_result_path: samples/golden/no-translate-false/expected

  - id: localization-duplicate-key-error
    name: Duplicate Localization Key Returns Error
    description: Build the duplicate-localization-key fixture and verify that no output is created.
    command:
      verb: build
      sources:
        - samples/fixtures/duplicate-localization-key.frag.xml
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 1
      config_created: false

  - id: invalid-orphaned-localization-key
    name: Orphaned Localization Key Returns Error
    description: Build a fixture with a localization key not referenced by any DescriptionKey property in any fragment and verify that no Config directory is created.
    command:
      verb: build
      sources:
        - samples/fixtures/orphaned-localization-key.frag.xml
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 1
      config_created: false

  - id: description-key-wrong-target-warning
    name: DescriptionKey on Non-Item-Block Target Produces Warning
    description: Build a fixture whose fragment targets 'recipes' (a target that does not support DescriptionKey) but contains a DescriptionKey property. The build must succeed (exit 0) and emit a warning that the property will have no effect.
    command:
      verb: build
      sources:
        - samples/fixtures/description-key-wrong-target.frag.xml
      output: "{tempOut}"
      verbosity: warning
    expected:
      exit_code: 0
      config_created: true
      stdout_contains:
        - "does not support DescriptionKey"
