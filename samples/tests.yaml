tests:
  # Golden sample cases
  - id: alloy-motor-tool-parts-golden
    name: Alloy Motor Tool Parts Golden Match
    description: Build the Alloy Motor Tool Parts sample and compare the output with the checked-in expected files.
    category: golden
    command:
      verb: build
      sources:
        - samples/real/alloy-motor-tool-parts/src
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 0
      assertion_mode: golden
      expected_result_path: samples/real/alloy-motor-tool-parts/expected
      config_created: true

  - id: epic-cash-golden
    name: Epic Cash Golden Match
    description: Build the Epic Cash sample and compare the output with the checked-in expected files.
    category: golden
    command:
      verb: build
      sources:
        - samples/real/epic-cash/src
      output: "{tempOut}"
      verbosity: none
    expected:
      exit_code: 0
